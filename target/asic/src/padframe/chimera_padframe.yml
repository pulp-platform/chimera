name: chimera_padframe

manifest_version: 2
#--------------------------------------------------
#|    User attribute for different domains        |
#--------------------------------------------------
user_attr:
  # Dynamic group A parameters
  gpioa_count: &gpioa_count 32
  i2ca_count: &i2ca_count 1
  spia_count: &spia_count 1
  uarta_count: &uarta_count 1

  # # Dynamic group B parameters
  # gpiob_count: &gpiob_count 0
  # i2cb_count: &i2cb_count 0
  # spib_count: &spib_count 0
  # uartb_count: &uartb_count 0

pad_domains:
  - name: aon_static # Domains containing only static signals, i.e. non muxed signals
    pad_types:
      - name: pull_down_pad
        # user defined name of the pad. Used to reference it
                              # in the pad_list
        description: TSCM65 pad with controllable integrated 1kOhm pull down resistor
        # The template value is a Mako template (https://www.makotemplates.org/)
        # that specifies how to instantiate this partuclar pad. The '|' in the
        # beginning is YAML syntax to allow multiline strings without the need
        # for manual character escaping
        template: |
          PDDW04808 ${instance_name} (
            .PAD(${conn["pad"]}),
            .IE(${conn["rx_en"]}),
            .OE(${conn["output_en"]}),
            .DS(${conn["driving_strength"]}),
            .I(${conn["chip2pad"]}),
            .O(${conn["pad2chip"]})
          );

        pad_signals: &default_pad_signals
        # The pad signals section specifies a list of all pad signald used in
        # this particular pad_domain. This include the rx signal, tx signal, the
        # actual pad signal as well as all pad configuration signals. These are
        # the signals that can be referenced by name in the pad instantiation
        # templates within the pad_types sections, the connections of each pad
        # within the pad_list as well as the connections section in the
        # port_list.
          - name: output_en
            description: "Enables the output driver of the pad" #optional description
                                                         #of the signal
            size: 1 # The number of bits
            kind: input # The signal is an input signal to the pad i.e. a signal
                        # driven by the chip that controls the pad.
            conn_type: dynamic # This means, the signal value is dynamic. It can
                               # either be controlled by an autogenerated
                               # configuration register or (at runtime
                               # configurable) an IO signal (if any IO signal
                               # within the pad_domain is referencing it).
            or_override_signal: s_enable_all_outputs # Optional override signal
                                                      # that is and-gated with
                                                      # the control signal
            default_reset_value: 0 # The default reset value of the pad
                                      # signal if not overriden in the
                                      # "connections" section of a particular
                                      # pad instance
            default_static_value: 1'b0 # The default static value of the signal
                                       # if not overriden in the "connections"
                                       # section of a particular pad instance
          - name: driving_strength
            description: "Driving strength of the output driver"
            size: 3
            kind: input
            conn_type: static # This means, the signal has a static value that
                              # is either driven by a single signal or a
                              # constant value. The difference between the
                              # dynamic type is, that this pad_signal is not
                              # arbitrary connectable with IO signals in a
                              # crossbar fashion but tied to one dedicated
                              # signal only. The actual signal or value assigned
                              # is defined individually for each pad in the
                              # padlist or described globally with the
                              # default_static_value.
            default_reset_value: 0
            default_static_value: 1'b0
          - name: rx_en
            description: "Input buffer enable"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0
          - name: pad2chip
            description: "The signal that connects to the pads RX buffer"
            size: 1
            kind: output
            conn_type: dynamic # In case of static output pad_signals, literal
                               # value assignments are illegal since the signal
                               # is not drivable from the outside. Only the name
                               # for a dedicated padframe output signal can be
                               # specified.
            default_static_value: ~
          - name: chip2pad
            description: "The signal that connects to the pads TX driver"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 1
            default_static_value: 1'b0
          - name: pad # The name of the signal can be chosen arbitrarily but for
                      # the actual pad signal (the signal that connects to the
                      # bonding pads) the name "pad" is a good choice. It is
                      # legal to specify more than one signal of type pad (e.g.
                      # if you want to instantiate a special differential
                      # signaling pads ). However, at least one siganl of kind
                      # pad is required
            size: 1
            kind: pad # Pad signals are handled specially. They are always
                      # exposed directly to the toplevel of the generated
                      # padframe module and no type, override signals or default
                      # values are allowed.

      - name: IN22FDX_GPIO18_10M3S40PI
        description: "gf22 pad"
        template: |
          IN22FDX_GPIO18_10M3S40PI_IO_V ${instance_name} (
            .PAD(${conn["pad"]}),
            .DATA(${conn["chip2pad"]}),
            .Y(${conn["pad2chip"]}),
            .TRIEN(${conn["trie"]}),
            .RXEN(${conn["rxe"]}),
            .PUEN(${conn["pue"]}),
            .PDEN(${conn["pde"]}),
            .NDIN(1'b0),
            .NDOUT(),
            .DRV(${conn["drv"]}),
            .SLW(${conn["slw"]}),
            .SMT(${conn["smt"]}),
            .PWROK(PWROK_S),
            .IOPWROK(IOPWROK_S),
            .BAIS(BIAS_S),
            .RETC(RETC_S)
          );
        pad_signals: &IN22FDX_SIGNALS
          - name: pad
            size: 1
            kind: pad
          - name: chip2pad
            description: "Signal to connect internal Chip to the TX driver of the Pad"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0
          - name: pad2chip
            description: "Signal to connect the PAD RX driver to the internal Chip"
            size: 1
            kind: output
            conn_type: dynamic
          - name: trie
            description: "Active high tri-state enable: trie = 1 -> buffer is in tri-state mode, i.e. Hi-Z. To Transmit trie = 0"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 1
            default_static_value: 1'b1
          - name: rxe
            description: "Active high RX enable"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0
          - name: pue
            description: "Pull-Up resistor Enable"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0
          - name: pde
            description: "Pull-Down resistor Enable"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0
          - name: drv
            description: "Driving Strength selector"
            size: 2
            kind: input
            conn_type: dynamic
            default_reset_value: 3
            default_static_value: 2'b11
          - name: slw
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0
          - name: smt
            description: "Active High schmidt trigger Enable"
            size: 1
            kind: input
            conn_type: dynamic
            default_reset_value: 0
            default_static_value: 1'b0


    pad_list:
      #|------------------------------------|
      #|         STATIC PAD SIGNALS         |
      #|------------------------------------|

      - name: lse_clk
        description: "Low Speed External clock"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          chip2pad: 1'b0
          pad2chip: st_lse_clk
          rxe: 1'b1
          trie: 1'b1

      - name: hse_clk
        description: "High Speed External clock"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          chip2pad: 1'b0
          pad2chip: st_hse_clk
          rxe: 1'b1
          trie: 1'b1

      - name: byp_sel_clk
        description: "Bypass signal for clk selection"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          chip2pad: 1'b0
          pad2chip: st_byp_clk_sel
          trie: 1'b1
          rxe: 1'b1

      - name: rstn
        description: "Chip RESET signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          chip2pad: 1'b0
          pad2chip: st_rstn
          rxe: 1'b1
          trie: 1'b1

      - name: jtag_tck
        description: "JTAG clock pad signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          pad2chip: st_jtag_tck
          chip2pad: 1'b0
          rxe: 1'b1
          trie: 1'b1

      - name: jtag_trstn
        description: "JTAG negative reset pad signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          pad2chip: st_jtag_trstn
          chip2pad: 1'b0
          rxe: 1'b1
          trie: 1'b1

      - name: jtag_tms
        description: "JTAG TMS pad signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          pad2chip: st_jtag_tms
          chip2pad: 1'b0
          rxe: 1'b1
          trie: 1'b1

      - name: jtag_tdi
        description: "JTAG TDI pad signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          pad2chip: st_jtag_tdi
          chip2pad: 1'b0
          rxe: 1'b1
          trie: 1'b1

      - name: jtag_tdo
        description: "JTAG TDO pad signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          chip2pad: st_jtag_tdo
          trie: 1'b0
          rxe: 1'b0

      - name: bootsel
        description: "Boot mode selection signal"
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: true
        connections:
          chip2pad: 1'b0
          pad2chip: st_bootsel
          trie: 1'b1
          rxe: 1'b1

  - name: aon_gpioa
    pad_types:
      - name: pull_down_pad
        # user defined name of the pad. Used to reference it
                              # in the pad_list
        description: TSCM65 pad with controllable integrated 1kOhm pull down resistor
        # The template value is a Mako template (https://www.makotemplates.org/)
        # that specifies how to instantiate this partuclar pad. The '|' in the
        # beginning is YAML syntax to allow multiline strings without the need
        # for manual character escaping
        template: |
          PDDW04808 ${instance_name} (
            .PAD(${conn["pad"]}),
            .IE(${conn["rx_en"]}),
            .OE(${conn["output_en"]}),
            .DS(${conn["driving_strength"]}),
            .I(${conn["chip2pad"]}),
            .O(${conn["pad2chip"]})
          );

        pad_signals: *default_pad_signals

      - name: IN22FDX_GPIO18_10M3S40PI
        description: "gf22 pad"
        template: |
          IN22FDX_GPIO18_10M3S40PI_IO_V ${instance_name} (
            .PAD(${conn["pad"]}),
            .DATA(${conn["chip2pad"]}),
            .Y(${conn["pad2chip"]}),
            .TRIEN(${conn["trie"]}),
            .RXEN(${conn["rxe"]}),
            .PUEN(${conn["pue"]}),
            .PDEN(${conn["pde"]}),
            .NDIN(1'b0),
            .NDOUT(),
            .DRV(${conn["drv"]}),
            .SLW(${conn["slw"]}),
            .SMT(${conn["smt"]}),
            .PWROK(PWROK_S),
            .IOPWROK(IOPWROK_S),
            .BAIS(BIAS_S),
            .RETC(RETC_S)
          );
        pad_signals: *IN22FDX_SIGNALS

    pad_list:
      #|------------------------------------|
      #|         DYNAMIC PAD SIGNALS        |
      #|------------------------------------|

      - name: gpio_{i}
        mux_groups: [gpio_seta,"gpioa_{i}"]
        description: "General purpose GPIO A. All peripherals can be connected to these Pads."
        multiple: *gpioa_count
        pad_type: IN22FDX_GPIO18_10M3S40PI
        is_static: false
        #default_port:

    port_groups:
      - name: qspi{i}
        description: "Set of QSPI ports"
        output_defaults: 1'b0
        mux_groups: [gpio_seta]
        multiple: *spia_count
        ports:
          - name: sd0
            description: "Serial Data port of the QSPI manager peripheral: 0th bit"
            connections:
              chip2pad: sd0_o
              sd0_i: pad2chip
              trie: ~sd0_en_o
              rxe: ~sd0_en_o

          - name: sd1
            description: "Serial Data port of the QSPI manager peripheral: 1st bit"
            connections:
              chip2pad: sd1_o
              sd1_i: pad2chip
              trie: ~sd1_en_o
              rxe: ~sd1_en_o

          - name: sd2
            description: "Serial Data port of the QSPI manager peripheral: 2nd bit"
            connections:
              chip2pad: sd2_o
              sd2_i: pad2chip
              trie: ~sd2_en_o
              rxe: ~sd2_en_o

          - name: sd3
            description: "Serial Data port of the QSPI manager peripheral: 3rd bit"
            connections:
              chip2pad: sd3_o
              sd3_i: pad2chip
              trie: ~sd3_en_o
              rxe: ~sd3_en_o

          - name: sck
            description: "Clock signal of the manager module"
            connections:
              chip2pad: sck_o
              trie: sck_en_o
              #rxe: 1'b0         # Undefined signal are connected to Reg that can be changed later

          - name: csb0
            description: "Chip Select signal active Low"
            connections:
              chip2pad: csb0_o
              trie: ~csb0_en_o
              #rxe: 1'b0

          - name: csb1
            description: "Chip Select signal active Low"
            connections:
              chip2pad: csb1_o
              trie: ~csb1_en_o
              #rxe: 1'b0

          - name: csb2
            description: "Chip Select signal active Low"
            connections:
              chip2pad: csb2_o
              trie: ~csb2_en_o
              #rxe: 1'b0

      - name: i2c{i}
        description: "Set of I2C ports"
        output_defaults: 1'b0
        multiple: *i2ca_count
        mux_groups: [gpio_seta]
        ports:
          - name: sda
            description: "SDA port of the I2C peripheral"
            connections:
              chip2pad: sda_o
              sda_i: pad2chip
              trie: ~sda_en_o
              rxe: ~sda_en_o

          - name: scl
            description: "Manager clock signal"
            connections:
              chip2pad: scl_o
              scl_i: pad2chip
              trie: ~scl_en_o
              rxe: ~scl_en_o

      - name: uart{i}
        description: "Tx and RX ports for the UART peripheral"
        output_defaults: 1'b0
        multiple: *uarta_count
        mux_groups: [gpio_seta]
        ports:
          - name: rx
            description: "RX port"
            connections:
              rx_i: pad2chip
              #trie: 1'b1
              rxe: 1'b1

          - name: tx
            description: "TX port"
            connections:
              chip2pad: tx_o
              trie: 1'b0
              # rxe: 1'b0

      - name: gpioa{i}
        multiple: *gpioa_count
        mux_groups: ["gpioa_{i}"]
        output_defaults: 1'b0
        ports:
          - name: gpio
            description: "GPIO A port"
            connections:
              chip2pad: gpio_o
              gpio_i: pad2chip
              trie: ~gpio_en_o
              rxe: ~gpio_en_o

